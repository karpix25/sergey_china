version: '3.8'

services:
  backend:
    build: ./backend
    container_name: tiktok_backend
    restart: always
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SCRAPE_CREATORS_API_KEY=${SCRAPE_CREATORS_API_KEY}
      - GOOGLE_APPLICATION_CREDENTIALS=${GOOGLE_APPLICATION_CREDENTIALS:-/app/google-credentials.json}
      - GOOGLE_CREDENTIALS_JSON=${GOOGLE_CREDENTIALS_JSON}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - GCS_BUCKET_NAME=${GCS_BUCKET_NAME}
    volumes:
      - ./backend:/app
      - ./outputs:/app/outputs
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=${VITE_API_URL}
        - VITE_INTERNAL_API_KEY=${INTERNAL_API_KEY}
    container_name: tiktok_frontend
    restart: always
    ports:
      - "5173:80"
    stdin_open: true
    tty: true
    volumes:
      - ./frontend:/app
      - /app/node_modules
